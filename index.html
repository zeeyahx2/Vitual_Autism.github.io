<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Autism</title>
    <link rel="stylesheet" href="asset/css/style.css">
    <link rel="stylesheet" href="asset/css/component.css">
</head>

<body>
    <!-- <header class="top">
        <div class="background-top">
            <img src="asset/icon/sun-clown.svg" alt="background-top">
        </div>
    </header> -->

    <nav class="navbar">
        <div class="circle">
            <div class="ellipse">
                <img src="asset/icon/Ellipse 2.svg">
            </div>
        </div>
        
        <a href="#" class="nav-item active" data-index="0">
            <img src="asset/icon/Home.svg">
           <b> <span>Home</span></b>
        </a>

        <a href="#" class="nav-item" data-index="1">
            <img src="asset/icon/Quest.svg">
            <b><span>Quest</span></b>
        </a>

        <a href="#" class="nav-item" data-index="2">
            <img src="asset/icon/History.svg">
            <b><span>History</span></b>
        </a>

        <a href="#" class="nav-item" data-index="3">
            <img src="asset/icon/Booking.svg">
            <b><span>Booking</span></b>
        </a>
    </nav>

    <main class="page">

        <section class="Booking" id="page_summary">
            <button class="btn-add" id="btnadd" aria-label="add-booking">
                <img src="asset/icon/add-booking.svg" alt="booking-button">
            </button>

            <section class="calendar">
                <div class="calendar-container">
                    <div class="cal-head">
                        <div class="month" id="monthTitle"></div>
                        <div class="pnmonth">
                            <button id="prevMonth">
                                <img src="asset/icon/prevmonth-arr.svg" alt="prevmonth">
                            </button>
                            <button id="nextMonth">
                                <img src="asset/icon/nextmonth-arr.svg" alt="nextMonth">
                            </button>
                        </div>
                    </div>

                    <div class="cal-week">
                        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                    </div>

                    <div class="cal-grid" id="calGrid">

                    </div>
                </div>
            </section>

            <section class="summary-card">
                <div class="summary-head">
                    <h2>Summary Activity</h2>
                    <img src="asset/icon/flower.svg" alt="flower-sum">
                </div>

                <div id="summarybox" class="summary-box">
                    <p class="muted">ยังไม่ได้เลือกวัน</p>
                </div>
            </section>

        </section>

        <section class="Booking hidden" id="page_booking">
            <div class="top-booking">
                <img src="asset/icon/textBooking.svg" alt="textbooking">
            </div>

            <p id="pickedDateText"></p>

            <section class="calendar">
                <div class="calendar-container">
                    <div class="cal-head">
                        <div class="calendar" id="monthTitle2"></div>
                        <button id="prevMonth2">
                            <img src="asset/icon/prevmonth-arr.svg" alt="prevMonth2">
                        </button>
                        <button id="nextMonth2">
                            <img src="asset/icon/nextmonth-arr.svg" alt="nextMonth2">
                        </button>
                    </div>

                    <div class="cal-week">
                        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                    </div>

                    <div class="cal-grid" id="calGrid2"></div>
                </div>
            </section>

            <section class="time-row">
                <div class="time-box">
                    <div class="tcol">
                        <button class="tbtn" data-act="sh-">
                            <img src="asset/icon/upArrow.svg" alt="uphstart">
                        </button>
                        <div  class="tval" id="sh">00</div>
                        <button class="tbtn" data-act="sh+">
                            <img src="asset/icon/downArrow.svg" alt="downhstart">
                        </button>
                    </div>

                    <div class="tcol">
                        <button class="tbtn" data-act="sm-">
                            <img src="asset/icon/upArrow.svg" alt="upminstart">
                        </button>
                        <div class="tval" id="sm">00</div>
                        <button class="tbtn" data-act="sm+">
                            <img src="asset/icon/downArrow.svg" alt="downminstart">
                        </button>
                    </div>
                </div>

                <div class="to">TO</div>

                <div class="time-box">
                    <div class="tcol">
                        <button class="tbtn" data-act="eh-">
                            <img src="asset/icon/upArrow.svg" alt="uphend">
                        </button>
                        <div  class="tval" id="eh">00</div>
                        <button class="tbtn" data-act="eh+">
                            <img src="asset/icon/downArrow.svg" alt="downhend">
                        </button>
                    </div>

                    <div class="tcol">
                        <button class="tbtn" data-act="em-">
                            <img src="asset/icon/upArrow.svg" alt="upminend">
                        </button>

                        <div class="tval" id="em">00</div>

                        <button class="tbtn" data-act="em+">
                            <img src="asset/icon/downArrow.svg" alt="downminend">
                        </button>
                    </div>
                </div>
            </section>

            <section class="note-card">
                <div class="note-label">Add Note</div>
                <input id="bookingnote" class="note-input" placeholder="" />
                <div class="lines">
                    <div></div><div></div><div></div>
                </div>
            </section>

            <section class="button-act">
                <button id="btnBack" class="abtn">BACK</button>
                <button id="btnAccept" class="abtn">ACCEPT</button>
            </section>
        </section>
    </main>

    <script src="asset/js/main.js"></script>
</body>

</html>
